<!DOCTYPE html><html><body>
<h2>Vanilla v3</h2>
<div class="be-marquee" data-settings='{"gap":40,"reverse_on_hover":true,"pause_on_click":true}'>
<div class="be-marquee-inner">
<div class="marquee-item">Item 1</div>
<div class="marquee-item">Item 2</div>
</div></div>

<div class="be-marquee"
     data-settings='{
        "vertical": true,

        "reverse_on_hover":true,
        "gap": 20,
        "loop": true
     }'>

    <div class="be-marquee-inner">
        <div class="marquee-item">Item 1</div>
        <div class="marquee-item">Item 2</div>
        <div class="marquee-item">Item 3</div>
    </div>

</div>
<style>.marquee-item{padding:10px;background:#333;color:#fff;margin:5px;}</style>
<script src="bemarquee.js"></script>
</body></html>
